<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>AI Semantic Text Similarity</title>

    <!-- Bootstrap -->

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Font Awesome -->

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      body {
        background: aqua;

        min-height: 100vh;

        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;

        color: #0f172a;
      }

      .container {
        max-width: 950px;
      }

      .card {
        border: none;

        border-radius: 18px;

        background: white;

        box-shadow: 0 4px 14px rgba(15, 23, 42, 0.05);
      }

      .card-header {
        background: #2563eb;

        color: white;

        border: none;

        border-radius: 18px 18px 0 0 !important;

        text-align: center;

        padding: 1.3rem;
      }

      .card-header h1 {
        font-size: 1.8rem;

        font-weight: 700;

        margin: 0;
      }

      .card-header i {
        font-size: 2rem;

        margin-bottom: 0.6rem;

        display: block;
      }

      .card-header p {
        margin-top: 0.5rem;

        font-size: 0.9rem;

        opacity: 0.95;
      }

      .card-body {
        padding: 0.9rem !important;
      }

      .form-floating > label {
        color: #64748b;
      }

      .form-control {
        border-radius: 14px;

        border: 1.5px solid #e2e8f0;

        transition: all 0.25s ease;

        min-height: 120px;

        height: auto;

        overflow: hidden;

        resize: none;

        padding: 1rem;

        font-size: 0.95rem;

        line-height: 1.6;
      }

      .form-control:focus {
        border-color: #2563eb;

        box-shadow: 0 0 0 0.18rem rgba(37, 99, 235, 0.12);
      }

      .btn-primary {
        background: #2563eb;

        border: none;

        border-radius: 14px;

        padding: 10px 22px;

        font-weight: 600;

        font-size: 0.93rem;

        transition: all 0.25s ease;
      }

      .btn-primary:hover {
        background: #1d4ed8;

        transform: translateY(-1px);
      }

      .btn-outline-primary {
        border-radius: 14px;

        padding: 10px 20px;

        font-weight: 600;

        font-size: 0.92rem;
      }

      .generate-btn {
        margin: 1rem 0;
      }

      .loading {
        display: none;
      }

      .result-card {
        margin-top: 1rem;

        border: 1px solid #e2e8f0;

        border-radius: 16px;

        padding: 1rem;

        text-align: center;

        background: #ffffff;
      }

      .result-title {
        font-size: 1.2rem;

        font-weight: 600;

        margin-bottom: 1rem;
      }

      .result-score {
        font-size: 3rem;

        font-weight: 700;

        margin-bottom: 1rem;

        color: #0f172a;
      }

      .result-label {
        display: inline-block;

        padding: 0.5rem 1.2rem;

        border-radius: 999px;

        font-weight: 600;

        font-size: 0.9rem;
      }

      .similarity-high {
        background: #dcfce7;

        color: #166534;
      }

      .similarity-medium {
        background: #fef9c3;

        color: #854d0e;
      }

      .similarity-low {
        background: #fee2e2;

        color: #991b1b;
      }

      .text-preview {
        background: #f8fafc;

        border: 1px solid #e2e8f0;

        border-radius: 12px;

        padding: 0.8rem;

        margin-top: 1rem;

        font-size: 0.88rem;

        color: #334155;

        text-align: left;
      }

      .footer {
        text-align: center;

        margin-top: 1rem;

        font-size: 0.82rem;

        color: #64748b;
      }

      @media (max-width: 768px) {
        .card-header h1 {
          font-size: 1.5rem;
        }

        .result-score {
          font-size: 2.5rem;
        }
      }
    </style>
  </head>

  <body>
    <div class="container py-4">
      <div class="card">
        <div class="card-header">
          <i class="fas fa-brain"></i>

          <h1>AI Text Similarity</h1>

          <p>So sánh độ tương đồng ngữ nghĩa giữa hai văn bản bằng AI</p>
        </div>

        <div class="card-body">
          <form method="POST">
            {% csrf_token %}

            <div class="row">
              <div class="col-md-6 mb-3">
                <div class="form-floating">
                  {{ form.text1 }}

                  <label for="{{ form.text1.id_for_label }}">
                    <i class="fas fa-file-alt me-2"></i>

                    {{ form.text1.label }}
                  </label>
                </div>
              </div>

              <div class="col-md-6 mb-3">
                <div class="form-floating">
                  {{ form.text2 }}

                  <label for="{{ form.text2.id_for_label }}">
                    <i class="fas fa-file-alt me-2"></i>

                    {{ form.text2.label }}
                  </label>
                </div>
              </div>
            </div>

            <div
              class="d-flex justify-content-center gap-3 generate-btn flex-wrap"
            >
              <button
                type="button"
                class="btn btn-outline-primary"
                id="generateBtn"
                onclick="generateRandomTexts()"
              >
                <i class="fas fa-wand-magic-sparkles me-2"></i>

                Tự sinh văn bản

                <span class="loading" id="loadingSpinner">
                  <span class="spinner-border spinner-border-sm ms-2"></span>
                </span>
              </button>

              <button type="submit" class="btn btn-primary">
                <i class="fas fa-scale-balanced me-2"></i>

                So sánh văn bản
              </button>
            </div>
          </form>

          {% if result %}

          <div class="result-card">
            <div class="result-title">
              <i class="fas fa-chart-line me-2"></i>

              Kết quả phân tích
            </div>

            <div class="result-score">{{ result.score }}%</div>

            <div
              class="result-label {% if result.score >= 70 %} similarity-high {% elif result.score >= 40 %} similarity-medium {% else %} similarity-low {% endif %}"
            >
              {{ result.label }}
            </div>
          </div>

          {% endif %}
        </div>
      </div>

      <div class="footer">
        <i class="fas fa-brain me-1"></i>

        Powered by Sentence Transformers & Semantic Embedding
      </div>
    </div>

    <script>
      function autoResizeTextarea(textarea) {
        textarea.style.height = "auto";

        textarea.style.height = textarea.scrollHeight + "px";
      }

      document.addEventListener("DOMContentLoaded", function () {
        const textareas = document.querySelectorAll("textarea");

        textareas.forEach((textarea) => {
          autoResizeTextarea(textarea);

          textarea.addEventListener("input", () => {
            autoResizeTextarea(textarea);
          });
        });
      });

      function generateRandomTexts() {
        const generateBtn = document.getElementById("generateBtn");

        const loadingSpinner = document.getElementById("loadingSpinner");

        const text1Input = document.getElementById("id_text1");

        const text2Input = document.getElementById("id_text2");

        generateBtn.disabled = true;

        loadingSpinner.style.display = "inline-block";

        fetch("/api/generate-texts/")
          .then((response) => response.json())

          .then((data) => {
            text1Input.value = data.text1;

            text2Input.value = data.text2;

            autoResizeTextarea(text1Input);

            autoResizeTextarea(text2Input);
          })

          .catch((error) => {
            console.error(error);

            alert("Không thể tạo văn bản ngẫu nhiên.");
          })

          .finally(() => {
            generateBtn.disabled = false;

            loadingSpinner.style.display = "none";
          });
      }
    </script>
  </body>
</html>
